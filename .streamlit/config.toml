# Streamlit configuration (safe to commit — contains no secrets).

[theme]
primaryColor = "#C5A059"
backgroundColor = "#F9F8F4"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1F2937"
font = "serif"

[server]
headless = true
# Security: keep CORS and XSRF protection ON for production deployments.
enableCORS = true
enableXsrfProtection = true
# Cap uploads to match MAX_FILE_BYTES in streamlit_app.py (megabytes).
maxUploadSize = 15

[browser]
gatherUsageStats = false

[client]
# Don't leak Python tracebacks to end users in production.
showErrorDetails = false
